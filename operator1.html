<!DOCTYPE html>
<html>
<head>
    <title>JavaScript String Concepts</title>
</head>
<body>

<h2>JavaScript String Concepts</h2>

<script>
    let firstName = "John";
    let lastName = "Doe";

    let fullName = firstName + " " + lastName;
    document.write("Full Name: " + fullName + "<br>");

    let message = "Hello";
    message += " World!";
    document.write("Message: " + message + "<br>");

    document.write("Length: " + fullName.length + "<br>");
    document.write("Uppercase: " + fullName.toUpperCase() + "<br>");
    document.write("Lowercase: " + fullName.toLowerCase() + "<br>");
    document.write("First Character: " + fullName.charAt(0) + "<br>");
    document.write("Index of 'D': " + fullName.indexOf("D") + "<br>");
    document.write("Substring (0,4): " + fullName.substring(0,4) + "<br>");
    document.write("Replace John with Alice: " + fullName.replace("John", "Alice") + "<br>");
    document.write("Contains 'Doe': " + fullName.includes("Doe") + "<br>");

    let words = fullName.split(" ");
    document.write("Split: " + words + "<br>");
</script>

</body>
</html>
