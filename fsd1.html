<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Output Methods</title>
</head>
<body>

    <h1>JavaScript Output Methods</h1>

    <p id="demo"></p>

    <script>
        console.log("This is console.log() output.");
        alert("This is an alert box!");
        document.write("<h3>This text is displayed using document.write().</h3>");
        document.getElementById("demo").innerHTML =
            "This text is displayed using innerHTML.";
    </script>

</body>
</html>
