<!DOCTYPE html>
<html>

<head>
    <title>Global Scope Example</title>
</head>

<body>

    <h2>Global Scope</h2>

    <script>
        let name = "Rahul";

        function display() {
            console.log("Name:", name);
        }

        display();

        console.log("Outside Function:", name);
    </script>

</body>

</html>
